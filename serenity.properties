serenity.project.name=Frontend Test Automation Portfolio
serenity.take.screenshots=FOR_FAILURES
serenity.console.colors=true
serenity.requirements.dir=src/test/resources/features
webdriver.driver=chrome
webdriver.autodownload=true
webdriver.maximize=false
chrome.switches=--headless=new;--window-size=1440,900;--disable-gpu;--no-sandbox
serenity.restart.browser.for.each=feature
