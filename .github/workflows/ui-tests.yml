name: UI Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Optional Cucumber tag filter, for example @smoke'
        required: false
        default: ''

jobs:
  frontend-ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Serenity BDD suite
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tags }}" ]; then
            mvn -B clean verify -Dcucumber.filter.tags="${{ github.event.inputs.tags }}"
          else
            mvn -B clean verify
          fi

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
